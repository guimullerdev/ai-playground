services:
  chat:
    build: .
    command: python3 app/main.py
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    stdin_open: true
    tty: true

  web:
    build: .
    command: uvicorn app.server:app --host 0.0.0.0 --port 8000
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"

  security-tests:
    build: .
    command: python3 security/tests.py
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
