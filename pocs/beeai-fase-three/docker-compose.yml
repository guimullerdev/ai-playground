services:
  chat:
    build: .
    command: python3 app/main.py
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
    stdin_open: true
    tty: true

  web:
    build: .
    command: uvicorn app.server:app --host 0.0.0.0 --port 8000
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
    ports:
      - "8000:8000"

  security-tests:
    build: .
    command: python3 security/tests.py
    environment:
      - BACKEND=${BACKEND:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
